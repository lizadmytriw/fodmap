const sevColor    = s => s <= 3 ? "#6DBF8A" : s <= 6 ? "#F4A435" : "#E05C5C";
const todayIdx    = () => { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; };
const todayKey    = () => new Date().toISOString().split("T")[0];

function App() {
  const [tab, setTab]             = useState("meals");
  const [selDay, setSelDay]       = useState(todayIdx());
  const [safeFoods, setSafeFoods] = useState(INIT_SAFE_FOODS);
  const [safeSearch, setSafeSearch] = useState("");
  const [safeFilter, setSafeFilter] = useState("All");
  const [showAddSafe, setShowAddSafe] = useState(false);
  const [newName, setNewName]     = useState("");
  const [newCat, setNewCat]       = useState("Fruit");
  const [newEmoji, setNewEmoji]   = useState("🍎");
  const [trigSearch, setTrigSearch] = useState("");
  const [trigFilter, setTrigFilter] = useState("All");
  const [swaps, setSwaps]         = useState({});
  const [picker, setPicker]       = useState(null);
  const [reactionLog, setRxLog]   = useState([]);
  const [showRxForm, setShowRxForm] = useState(false);
  const [rxFood, setRxFood]       = useState("");
  const [rxSymptoms, setRxSymptoms] = useState([]);
  const [rxSev, setRxSev]         = useState(5);
  const [rxDelay, setRxDelay]     = useState("under30");
  const [rxNotes, setRxNotes]     = useState("");
  const [dailyLog, setDailyLog]   = useState({});
  const [showFoodForm, setShowFoodForm] = useState(false);
  const [logDate, setLogDate]     = useState(todayKey());
  const [logMeal, setLogMeal]     = useState("breakfast");
  const [logTime, setLogTime]     = useState(() => new Date().toTimeString().slice(0,5));
  const [logMode, setLogMode]     = useState("free");
  const [logText, setLogText]     = useState("");
  const [logPicked, setLogPicked] = useState([]);
  const [logNotes, setLogNotes]   = useState("");
  const [weekDay, setWeekDay]     = useState(todayKey());

  const safeNames  = new Set(safeFoods.map(f => f.name));
  const safeByName = Object.fromEntries(safeFoods.map(f => [f.name, f]));
  const safeCats   = ["All", ...new Set(safeFoods.map(f => f.category))];
  const trigCats   = ["All", ...new Set(TRIGGER_FOODS.map(f => f.category))];

  const getIng      = (day, mt, ing) => swaps[`${day}-${mt}-${ing}`] || ing;
  const resolveIngs = (day, mt, ings) => ings.map(ing => { const resolved = getIng(day, mt, ing); return { original:ing, resolved, missing:!safeNames.has(resolved), swapped: resolved !== ing }; });

  const addSafe    = () => { if (!newName.trim()) return; setSafeFoods(p => [...p, {id:"sf"+Date.now(), name:newName.trim(), category:newCat, emoji:newEmoji}]); setNewName(""); setShowAddSafe(false); };
  const removeSafe = id => setSafeFoods(p => p.filter(f => f.id !== id));
  const applySwap  = rep => { if (!picker) return; setSwaps(p => ({ ...p, [`${picker.day}-${picker.mt}-${picker.ing}`]: rep })); setPicker(null); };
  const toggleSym  = s => setRxSymptoms(p => p.includes(s) ? p.filter(x => x !== s) : [...p, s]);
  const togglePick = n => setLogPicked(p => p.includes(n) ? p.filter(x => x !== n) : [...p, n]);

  const submitRx = () => {
    if (!rxFood.trim()) return;
    setRxLog(p => [{id:Date.now(), food:rxFood, symptoms:rxSymptoms, severity:rxSev, delay:rxDelay, notes:rxNotes, date:todayKey(), time:new Date().toTimeString().slice(0,5)}, ...p]);
    setRxFood(""); setRxSymptoms([]); setRxSev(5); setRxDelay("under30"); setRxNotes(""); setShowRxForm(false);
  };

  const submitFood = () => {
    let items = [];
    if (logMode === "free") items = logText.split(",").map(s=>s.trim()).filter(Boolean);
    else if (logMode === "pick") items = logPicked;
    else if (logMode === "plan") { const plan = BASE_MEALS[todayIdx()]; items = resolveIngs(plan.day, logMeal, plan.meals[logMeal]?.ingredients || []).map(i => i.resolved); }
    if (!items.length) return;
    setDailyLog(p => ({...p, [logDate]: [...(p[logDate]||[]), {id:Date.now(), time:logTime, mealType:logMeal, items, notes:logNotes}]}));
    setLogText(""); setLogPicked([]); setLogNotes(""); setShowFoodForm(false);
  };

  const filtSafe = safeFoods.filter(f => f.name.toLowerCase().includes(safeSearch.toLowerCase()) && (safeFilter==="All"||f.category===safeFilter));
  const filtTrig = TRIGGER_FOODS.filter(f => f.name.toLowerCase().includes(trigSearch.toLowerCase()) && (trigFilter==="All"||f.category===trigFilter));

  const TABS = [
    {id:"meals",    label:"Meal Plan",  icon:"🍽️"},
    {id:"timeline", label:"My Week",    icon:"🌸"},
    {id:"safe",     label:"Safe Foods", icon:"🌿"},
    {id:"triggers", label:"Triggers",   icon:"🚫"},
    {id:"log",      label:"Reactions",  icon:"📓"},
  ];
  const accentForTab = { meals:"#F4A435", timeline:"#E07B9A", safe:"#6DBF8A", triggers:"#E05C5C", log:"#C47FD6" };

  return (
    <div style={{minHeight:"100vh",background:"#FFF5EE",fontFamily:font,color:"#5A2D4C",position:"relative",overflowX:"hidden"}}>
      <BlobBg/>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&display=swap');
        *{box-sizing:border-box}
        input[type=range]{accent-color:#E07B9A}
        ::-webkit-scrollbar{width:6px}
        ::-webkit-scrollbar-thumb{background:#F0D0DC;border-radius:10px}
        button:hover{opacity:0.88}
      `}</style>

      {picker && (
        <div style={{position:"fixed",inset:0,background:"rgba(90,45,76,0.45)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:20,backdropFilter:"blur(4px)"}} onClick={()=>setPicker(null)}>
          <div style={{background:"#FFF8F5",border:"3px solid #F0D6E8",borderRadius:24,padding:"28px 24px",maxWidth:430,width:"100%",maxHeight:"75vh",overflow:"auto",boxShadow:"0 20px 60px rgba(90,45,76,0.25)"}} onClick={e=>e.stopPropagation()}>
            <div style={{textAlign:"center",marginBottom:18}}>
              <div style={{fontSize:28,marginBottom:6}}>🔄</div>
              <div style={{fontSize:11,color:"#C47FD6",textTransform:"uppercase",letterSpacing:"0.1em",marginBottom:4}}>Swap ingredient</div>
              <div style={{fontSize:16,color:"#5A2D4C",fontWeight:"600"}}>"{picker.ing}"</div>
              <div style={{fontSize:12,color:"#A07090",marginTop:4}}>Pick a replacement from your safe foods:</div>
            </div>
            {["Fruit","Vegetables","Protein","Grains","Dairy-Free","Fats & Oils","Sweeteners"].map(cat => {
              const items = safeFoods.filter(f => f.category===cat && f.name!==picker.ing);
              if (!items.length) return null;
              return (
                <div key={cat} style={{marginBottom:14}}>
                  <div style={{fontSize:10,textTransform:"uppercase",letterSpacing:"0.1em",color:"#C47FD6",marginBottom:7,fontWeight:"600"}}>{cat}</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                    {items.map(f => (
                      <button key={f.id} onClick={()=>applySwap(f.name)} style={{padding:"5px 12px",borderRadius:16,border:"2px solid #F0D6E8",background:"#FFF0F8",color:"#7A3060",cursor:"pointer",fontSize:12,fontFamily:font,display:"flex",alignItems:"center",gap:4}}>
                        {f.emoji} {f.name}
                      </button>
                    ))}
                  </div>
                </div>
              );
            })}
            <Btn onClick={()=>setPicker(null)} ghost color="#C47FD6" style={{marginTop:10}}>✕ Cancel</Btn>
          </div>
        </div>
      )}

      <div style={{position:"sticky",top:0,zIndex:50,background:"rgba(255,245,238,0.92)",backdropFilter:"blur(12px)",borderBottom:"2px solid #F5E0EC"}}>
        <div style={{maxWidth:960,margin:"0 auto",padding:"14px 24px 0"}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:10}}>
            <div style={{width:44,height:44,borderRadius:"50%",background:"linear-gradient(135deg,#F4A435,#E07B9A)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,boxShadow:"0 4px 12px #E07B9A44"}}>🌿</div>

                <input value={rxFood} onChange={e=>setRxFood(e.target.value)} placeholder="What did you eat?" style={{...inp,marginBottom:10}}/>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
                  {SYMPTOMS.map(s=><button key={s} onClick={()=>toggleSym(s)} style={{padding:"4px 11px",borderRadius:16,border:`2px solid ${rxSymptoms.includes(s)?"#C47FD6":"#E8D5F0"}`,background:rxSymptoms.includes(s)?"#F5E8FF":"#FFF8F5",color:rxSymptoms.includes(s)?"#8A3DB8":"#A07090",cursor:"pointer",fontSize:11,fontFamily:font}}>{s}</button>)}
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:12}}>
                  <div>
                    <label style={lbl("#C47FD6")}>Severity: <strong style={{color:sevColor(rxSev)}}>{rxSev}/10</strong></label>
                    <input type="range" min={1} max={10} value={rxSev} onChange={e=>setRxSev(Number(e.target.value))} style={{width:"100%",marginTop:4}}/>
                  </div>
                  <div>
                    <label style={lbl("#C47FD6")}>Time to reaction</label>
                    <div style={{display:"flex",flexDirection:"column",gap:4,marginTop:4}}>
                      {Object.entries(DELAY_LABELS).map(([v,l])=><button key={v} onClick={()=>setRxDelay(v)} style={{padding:"4px 10px",borderRadius:12,border:`2px solid ${rxDelay===v?"#C47FD6":"#E8D5F0"}`,background:rxDelay===v?"#F5E8FF":"transparent",color:rxDelay===v?"#8A3DB8":"#A07090",cursor:"pointer",fontSize:11,fontFamily:font,textAlign:"left"}}>{l}</button>)}
                    </div>
                  </div>
                </div>
                <Btn onClick={submitRx} color="#C47FD6">✓ Save Reaction</Btn>
              </Card>
            )}
            {reactionLog.length===0 ? (
              <div style={{textAlign:"center",padding:"52px 20px",background:"#FFF8F5",borderRadius:20,border:"2px dashed #F0D6E8"}}>
                <div style={{fontSize:36,marginBottom:8}}>🌸</div>
                <div style={{color:"#C4A0B8",fontSize:13}}>No reactions logged yet — that's a great sign!</div>
              </div>
            ) : (
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {reactionLog.map(entry=>(
                  <Card key={entry.id} color={sevColor(entry.severity)} style={{borderLeft:`5px solid ${sevColor(entry.severity)}`}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:7}}>
                      <div>
                        <div style={{fontSize:14,color:"#5A2D4C",fontWeight:"600",marginBottom:2}}>{entry.food}</div>
                        <div style={{fontSize:10,color:"#C4A0B8"}}>🕐 {entry.date} · Reaction: {DELAY_LABELS[entry.delay]}</div>
                      </div>
                      <div style={{display:"flex",gap:7,alignItems:"center"}}>
                        <span style={{fontSize:11,padding:"3px 10px",borderRadius:12,background:`${sevColor(entry.severity)}22`,color:sevColor(entry.severity),border:`1px solid ${sevColor(entry.severity)}44`,fontWeight:"600"}}>{entry.severity}/10</span>
                        <button onClick={()=>setRxLog(p=>p.filter(e=>e.id!==entry.id))} style={{background:"none",border:"none",cursor:"pointer",color:"#C4A0B8",fontSize:13}}>🗑</button>
                      </div>
                    </div>
                    {entry.symptoms?.length>0&&<div style={{display:"flex",gap:5,flexWrap:"wrap"}}>{entry.symptoms.map(s=><span key={s} style={{fontSize:10,padding:"3px 9px",borderRadius:10,background:"#FFF0EE",color:"#E05C5C",border:"1px solid #F5CECE"}}>{s}</span>)}</div>}
                    {entry.notes&&<div style={{fontSize:10,color:"#C4A0B8",fontStyle:"italic",marginTop:5}}>"{entry.notes}"</div>}
                  </Card>
                ))}
              </div>
            )}
          </div>
        )}

      </div>

      <div style={{borderTop:"2px solid #F5E0EC",padding:"14px 24px",textAlign:"center",fontSize:10,color:"#C4A0B8",background:"rgba(255,245,238,0.8)",position:"relative",zIndex:1}}>
        🌸 Gut Journal · Always consult your healthcare provider for medical advice. 🌸
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
</body>
</html>
